<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g-ao" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-aov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-or" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35"/><stop offset="1" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots-dark" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.1" fill="#F4C430" opacity="0.28"/>
    </pattern>
    <pattern id="dots-light" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.2" fill="#1A1A1A" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1080" height="1350" fill="#FAF3E0"/>
  <rect width="1080" height="1350" fill="url(#dots-light)"/>
  <rect x="0" y="0" width="1080" height="8" fill="url(#g-ao)"/>

  <!-- circulo decorativo (parcial, peek) -->
  <g opacity="0.18"><circle cx="1080" cy="160" r="260" fill="url(#g-ao)"/></g>
  <g opacity="0.35"><circle cx="1080" cy="160" r="260" fill="none" stroke="#FF6B35" stroke-width="2"/></g>

  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" letter-spacing="4" fill="#C41E3A">— CITAÇÃO · iLab</text>

  <!-- aspas decorativas alinhadas à esquerda -->
  <text x="80" y="380" font-family="Poppins,sans-serif" font-weight="900" font-size="280" fill="url(#g-ao)" opacity="0.9" dominant-baseline="alphabetic">"</text>

  <!-- citação (4 linhas, lead curto e equilibrado, último par com cor acento) -->
  <g font-family="Poppins,sans-serif" font-weight="800" font-size="60" letter-spacing="-2">
    <text x="80" y="540" fill="#1A1A1A">A inovação no Direito</text>
    <text x="80" y="616" fill="#1A1A1A">começa por dentro</text>
    <text x="80" y="692" fill="url(#g-or)">das salas de aula.</text>
  </g>

  <!-- separador entre quote e autor (grouping) -->
  <line x1="80" y1="800" x2="180" y2="800" stroke="#FF6B35" stroke-width="3"/>

  <!-- bloco autor: avatar + nome + cargo, todos alinhados ao baseline -->
  <g transform="translate(80 870)">
    <circle cx="44" cy="44" r="44" fill="url(#g-ao)"/>
    <text x="44" y="58" font-family="Poppins,sans-serif" font-weight="900" font-size="34" fill="#1A1A1A" text-anchor="middle">A</text>
    <text x="116" y="42" font-family="Poppins,sans-serif" font-weight="900" font-size="22" fill="#1A1A1A" letter-spacing="-0.5">NOME DO AUTOR</text>
    <text x="116" y="70" font-family="Montserrat,sans-serif" font-weight="400" font-size="16" fill="#1A1A1A" opacity="0.7">Cargo · Instituição</text>
  </g>

  <g transform="translate(80 1260)">
    <text font-family="Poppins,sans-serif" font-weight="900" font-size="28" letter-spacing="-1">
      <tspan fill="#C41E3A">i</tspan><tspan fill="#1A1A1A">Lab</tspan>
    </text>
    <text x="0" y="32" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#1A1A1A" opacity=".55">SANFRAN · FD-USP</text>
  </g>
  <text x="1000" y="1292" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#C41E3A" text-anchor="end">@SANFRANILAB</text>
</svg>