<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g-ao" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-aov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-or" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35"/><stop offset="1" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots-dark" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.1" fill="#F4C430" opacity="0.28"/>
    </pattern>
    <pattern id="dots-light" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.2" fill="#1A1A1A" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1080" height="1350" fill="#111111"/>
  <rect width="1080" height="1350" fill="url(#dots-dark)"/>

  <!-- explosão mesh atrás do número -->
  <g transform="translate(540 670)" opacity="0.55">
    <circle cx="0" cy="0" r="420" fill="url(#g-ao)" opacity="0.10"/>
    <circle cx="0" cy="0" r="320" fill="url(#g-ao)" opacity="0.15"/>
    <circle cx="0" cy="0" r="220" fill="url(#g-ao)" opacity="0.22"/>
  </g>

  <rect x="0" y="0" width="1080" height="8" fill="url(#g-ao)"/>
  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" letter-spacing="4" fill="#F4C430">MARCO HISTÓRICO · MAIO 2026</text>

  <!-- número HERO centralizado -->
  <text x="540" y="720" font-family="Poppins,sans-serif" font-weight="900" font-size="540" fill="url(#g-ao)" text-anchor="middle" letter-spacing="-20">500</text>

  <!-- pequeno selo abaixo -->
  <g transform="translate(540 800)">
    <rect x="-130" y="0" width="260" height="46" rx="23" fill="#FAF3E0"/>
    <text x="0" y="30" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" letter-spacing="3" fill="#1A1A1A" text-anchor="middle">ALUNOS FORMADOS</text>
  </g>

  <!-- contexto narrativo -->
  <g font-family="Poppins,sans-serif" font-weight="900" letter-spacing="-2">
    <text x="540" y="950" font-size="48" fill="#FAF3E0" text-anchor="middle">Quinhentos juristas.</text>
    <text x="540" y="1010" font-size="48" fill="url(#g-ao)" text-anchor="middle">Uma nova geração.</text>
  </g>
  <text x="540" y="1080" font-family="Montserrat,sans-serif" font-weight="400" font-size="20" fill="#FAF3E0" text-anchor="middle" opacity="0.7">3 anos · 12 turmas · 1 propósito</text>

  <g transform="translate(80 1260)">
    <text font-family="Poppins,sans-serif" font-weight="900" font-size="28" letter-spacing="-1">
      <tspan fill="#F4C430">i</tspan><tspan fill="#FAF3E0">Lab</tspan>
    </text>
    <text x="0" y="32" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#FAF3E0" opacity=".55">SANFRAN · FD-USP</text>
  </g>
  <text x="1000" y="1292" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#FF6B35" text-anchor="end">@SANFRANILAB</text>
</svg>