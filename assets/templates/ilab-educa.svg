<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g-ao" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-aov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-or" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35"/><stop offset="1" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots-dark" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.1" fill="#F4C430" opacity="0.28"/>
    </pattern>
    <pattern id="dots-light" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.2" fill="#1A1A1A" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="1080" height="1350" fill="#FAF3E0"/>
  <rect width="1080" height="1350" fill="url(#dots-light)"/>
  <!-- barra lateral gradient esquerda -->
  <rect x="0" y="0" width="14" height="1350" fill="url(#g-aov)"/>
  <rect x="0" y="0" width="1080" height="8" fill="url(#g-ao)"/>

  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="14" font-weight="700" letter-spacing="4" fill="#C41E3A">iLAB EDUCA · CONCEITO #07</text>

  <!-- termo principal -->
  <text x="80" y="280" font-family="JetBrains Mono,monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#1A1A1A" opacity="0.55">TERMO</text>
  <text x="80" y="380" font-family="Poppins,sans-serif" font-weight="900" font-size="108" fill="#1A1A1A" letter-spacing="-3">Legal Design.</text>
  <rect x="80" y="412" width="120" height="4" fill="#FF6B35"/>

  <!-- definição em lead -->
  <text x="80" y="490" font-family="JetBrains Mono,monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#C41E3A">DEFINIÇÃO</text>
  <g font-family="Montserrat,sans-serif" font-weight="500" font-size="24" fill="#1A1A1A">
    <text x="80" y="540">Aplicação dos princípios do design</text>
    <text x="80" y="574">à comunicação jurídica para torná-la</text>
    <text x="80" y="608" font-weight="700">clara, acessível e útil para pessoas.</text>
  </g>

  <!-- dois pilares (cards verticais) -->
  <g transform="translate(80 700)">
    <!-- pilar 1 -->
    <rect x="0" y="0" width="440" height="280" rx="14" fill="#1A1A1A"/>
    <text x="32" y="60" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#F4C430">PILAR 01</text>
    <text x="32" y="118" font-family="Poppins,sans-serif" font-weight="900" font-size="32" fill="#FAF3E0">Clareza</text>
    <line x1="32" y1="142" x2="80" y2="142" stroke="#FF6B35" stroke-width="3"/>
    <text x="32" y="186" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.78">Linguagem simples,</text>
    <text x="32" y="210" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.78">hierarquia visual e</text>
    <text x="32" y="234" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.78">estrutura escaneável.</text>
  </g>
  <g transform="translate(540 700)">
    <!-- pilar 2 -->
    <rect x="0" y="0" width="420" height="280" rx="14" fill="url(#g-or)"/>
    <text x="32" y="60" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#FAF3E0">PILAR 02</text>
    <text x="32" y="118" font-family="Poppins,sans-serif" font-weight="900" font-size="32" fill="#FAF3E0">Empatia</text>
    <line x1="32" y1="142" x2="80" y2="142" stroke="#1A1A1A" stroke-width="3"/>
    <text x="32" y="186" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.92">Pesquisa com usuários,</text>
    <text x="32" y="210" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.92">testes de leitura e</text>
    <text x="32" y="234" font-family="Montserrat,sans-serif" font-weight="400" font-size="17" fill="#FAF3E0" opacity="0.92">iteração contínua.</text>
  </g>

  <!-- exemplo prático -->
  <g transform="translate(80 1020)">
    <text x="0" y="0" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#C41E3A">EXEMPLO PRÁTICO</text>
    <text x="0" y="40" font-family="Poppins,sans-serif" font-weight="800" font-size="24" fill="#1A1A1A">Contratos visuais com diagramas,</text>
    <text x="0" y="72" font-family="Poppins,sans-serif" font-weight="800" font-size="24" fill="#1A1A1A">ícones e linguagem do dia a dia.</text>
  </g>

  <g transform="translate(80 1260)">
    <text font-family="Poppins,sans-serif" font-weight="900" font-size="28" letter-spacing="-1">
      <tspan fill="#C41E3A">i</tspan><tspan fill="#1A1A1A">Lab</tspan>
    </text>
    <text x="0" y="32" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="3" fill="#1A1A1A" opacity=".55">SANFRAN · FD-USP</text>
  </g>
  <text x="1000" y="1292" font-family="JetBrains Mono,monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#C41E3A" text-anchor="end">@SANFRANILAB</text>
</svg>