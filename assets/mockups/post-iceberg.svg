<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g-ao" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-aov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-or" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35"/><stop offset="1" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.1" fill="#F4C430" opacity="0.32"/>
    </pattern>
    <pattern id="grid-l" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" stroke="#1A1A1A" stroke-width="1" fill="none" opacity="0.06"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1080" height="540" fill="#FAF3E0"/>
  <rect x="0" y="540" width="1080" height="810" fill="#1A1A1A"/>
  <rect x="0" y="535" width="1080" height="10" fill="url(#g-ao)" opacity="0.85"/>
  <rect x="0" y="0" width="1080" height="10" fill="url(#g-ao)"/>
  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" letter-spacing="6" fill="#C41E3A">CARD 05 · ICEBERG</text>
  <text x="80" y="230" font-family="Poppins,sans-serif" font-weight="900" font-size="68" fill="#1A1A1A" letter-spacing="-2">O que você vê.</text>
  <text x="80" y="300" font-family="Poppins,sans-serif" font-weight="900" font-size="68" fill="url(#g-or)" letter-spacing="-2">E o que sustenta.</text>
  <!-- Iceberg shape -->
  <g transform="translate(680 200)">
    <polygon points="120,0 240,180 0,180" fill="#1A1A1A"/>
    <polygon points="0,180 240,180 320,720 -80,720" fill="#1A1A1A" opacity="0.85"/>
    <text x="120" y="100" font-family="JetBrains Mono,monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#F4C430" text-anchor="middle">10%</text>
    <text x="120" y="120" font-family="Montserrat,sans-serif" font-size="11" fill="#FAF3E0" text-anchor="middle" opacity="0.7">visível</text>
    <text x="120" y="440" font-family="JetBrains Mono,monospace" font-size="13" font-weight="700" letter-spacing="2" fill="#FF6B35" text-anchor="middle">90%</text>
    <text x="120" y="460" font-family="Montserrat,sans-serif" font-size="11" fill="#FAF3E0" text-anchor="middle" opacity="0.7">submerso</text>
  </g>
  <!-- Above water -->
  <text x="80" y="430" font-family="Poppins,sans-serif" font-weight="900" font-size="28" fill="#1A1A1A">VISÍVEL</text>
  <text x="80" y="480" font-family="Montserrat,sans-serif" font-size="20" fill="#1A1A1A" opacity="0.72">Eventos · Cursos · Publicações</text>
  <!-- Below water -->
  <text x="80" y="660" font-family="Poppins,sans-serif" font-weight="900" font-size="28" fill="#F4C430">SUBMERSO</text>
  <text x="80" y="710" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Pesquisa de fronteira</text>
  <text x="80" y="745" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Engenharia de prompts jurídicos</text>
  <text x="80" y="780" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Datasets curados de jurisprudência</text>
  <text x="80" y="815" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Métricas próprias de Legal Design</text>
  <text x="80" y="850" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Pipelines de validação ética de IA</text>
  <text x="80" y="885" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Modelagem de contratos inteligentes</text>
  <text x="80" y="920" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Pareceres assistidos por LLMs</text>
  <text x="80" y="955" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.78">Mentoria 1:1 com pesquisadores</text>
  <rect x="80" y="1010" width="160" height="3" fill="#FF6B35"/>
  <text x="80" y="1070" font-family="Montserrat,sans-serif" font-size="22" fill="#FAF3E0" opacity="0.65">O iLab é o que sustenta.</text>
  <text x="80" y="1280" font-family="Poppins,sans-serif" font-weight="900" font-size="30" fill="#F4C430">iLab<tspan fill="#FAF3E0" font-size="16" font-weight="400" dx="10">SANFRAN · FD-USP</tspan></text>
</svg>