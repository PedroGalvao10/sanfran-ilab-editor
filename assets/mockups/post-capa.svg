  <rect x="0" y="0" width="1080" height="10" fill="url(#g-ao)"/>
  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" letter-spacing="6" fill="#F4C430">SANFRAN iLAB · CARROSSEL 2026</text>
  <g transform="translate(80 280)">
