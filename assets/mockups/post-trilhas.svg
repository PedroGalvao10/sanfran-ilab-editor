<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <linearGradient id="g-ao" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-aov" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4C430"/><stop offset="1" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="g-or" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF6B35"/><stop offset="1" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.1" fill="#F4C430" opacity="0.32"/>
    </pattern>
    <pattern id="grid-l" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" stroke="#1A1A1A" stroke-width="1" fill="none" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1080" height="1350" fill="#FAF3E0"/>
  <rect width="1080" height="1350" fill="url(#grid-l)"/>
  <rect x="0" y="0" width="1080" height="10" fill="url(#g-ao)"/>
  <text x="80" y="140" font-family="JetBrains Mono,monospace" font-size="20" font-weight="700" letter-spacing="6" fill="#C41E3A">CARD 06 · TRILHAS DE FORMAÇÃO</text>
  <text x="80" y="240" font-family="Poppins,sans-serif" font-weight="900" font-size="78" fill="#1A1A1A" letter-spacing="-2">Três trilhas.</text>
  <text x="80" y="320" font-family="Poppins,sans-serif" font-weight="900" font-size="78" fill="url(#g-or)" letter-spacing="-2">Um destino: liderança.</text>
  <!-- 3 lanes -->
  <g transform="translate(80 420)">
    <!-- Trilha 1 -->
    <g>
      <rect x="0" y="0" width="920" height="240" fill="#1A1A1A" rx="14"/>
      <circle cx="80" cy="80" r="44" fill="#F4C430"/>
      <text x="80" y="96" font-family="JetBrains Mono,monospace" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">T1</text>
      <text x="160" y="74" font-family="Poppins,sans-serif" font-weight="900" font-size="36" fill="#FAF3E0">Jurista-Engenheiro</text>
      <text x="160" y="108" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.68">Direito + Programação + Sistemas.</text>
      <g transform="translate(160 140)">
        <rect x="0" y="0" width="120" height="30" rx="15" fill="#F4C430" opacity="0.18"/>
        <text x="60" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#F4C430" text-anchor="middle">Python</text>
        <rect x="130" y="0" width="120" height="30" rx="15" fill="#F4C430" opacity="0.18"/>
        <text x="190" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#F4C430" text-anchor="middle">Smart Contracts</text>
        <rect x="260" y="0" width="120" height="30" rx="15" fill="#F4C430" opacity="0.18"/>
        <text x="320" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#F4C430" text-anchor="middle">APIs Jurídicas</text>
      </g>
    </g>
    <!-- Trilha 2 -->
    <g transform="translate(0 260)">
      <rect x="0" y="0" width="920" height="240" fill="#1A1A1A" rx="14"/>
      <circle cx="80" cy="80" r="44" fill="#FF6B35"/>
      <text x="80" y="96" font-family="JetBrains Mono,monospace" font-size="28" font-weight="700" fill="#1A1A1A" text-anchor="middle">T2</text>
      <text x="160" y="74" font-family="Poppins,sans-serif" font-weight="900" font-size="36" fill="#FAF3E0">Jurista-Designer</text>
      <text x="160" y="108" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.68">Direito + UX + Legal Design.</text>
      <g transform="translate(160 140)">
        <rect x="0" y="0" width="120" height="30" rx="15" fill="#FF6B35" opacity="0.2"/>
        <text x="60" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FF6B35" text-anchor="middle">Figma</text>
        <rect x="130" y="0" width="120" height="30" rx="15" fill="#FF6B35" opacity="0.2"/>
        <text x="190" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FF6B35" text-anchor="middle">Contratos Visuais</text>
        <rect x="260" y="0" width="120" height="30" rx="15" fill="#FF6B35" opacity="0.2"/>
        <text x="320" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FF6B35" text-anchor="middle">Acessibilidade</text>
      </g>
    </g>
    <!-- Trilha 3 -->
    <g transform="translate(0 520)">
      <rect x="0" y="0" width="920" height="240" fill="#1A1A1A" rx="14"/>
      <circle cx="80" cy="80" r="44" fill="#C41E3A"/>
      <text x="80" y="96" font-family="JetBrains Mono,monospace" font-size="28" font-weight="700" fill="#FAF3E0" text-anchor="middle">T3</text>
      <text x="160" y="74" font-family="Poppins,sans-serif" font-weight="900" font-size="36" fill="#FAF3E0">Jurista-Fundador</text>
      <text x="160" y="108" font-family="Montserrat,sans-serif" font-size="20" fill="#FAF3E0" opacity="0.68">Direito + Empreendedorismo + Lawtech.</text>
      <g transform="translate(160 140)">
        <rect x="0" y="0" width="120" height="30" rx="15" fill="#C41E3A" opacity="0.28"/>
        <text x="60" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FAF3E0" text-anchor="middle">Pitch</text>
        <rect x="130" y="0" width="120" height="30" rx="15" fill="#C41E3A" opacity="0.28"/>
        <text x="190" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FAF3E0" text-anchor="middle">Cap Table</text>
        <rect x="260" y="0" width="120" height="30" rx="15" fill="#C41E3A" opacity="0.28"/>
        <text x="320" y="20" font-family="JetBrains Mono,monospace" font-size="11" font-weight="700" letter-spacing="1" fill="#FAF3E0" text-anchor="middle">Term Sheet</text>
      </g>
    </g>
  </g>
  <text x="80" y="1280" font-family="Poppins,sans-serif" font-weight="900" font-size="30" fill="#C41E3A">iLab<tspan fill="#1A1A1A" font-size="16" font-weight="400" dx="10">SANFRAN · FD-USP</tspan></text>
</svg>